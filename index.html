<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Copilot Entretien v5.0</title>
    <style>
        body { background: #0f0f0f; color: white; font-family: sans-serif; text-align: center; padding: 50px; }
        .card { background: #1a1a1a; padding: 30px; border-radius: 15px; border: 1px solid #333; max-width: 400px; margin: auto; }
        button { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        button:disabled { background: #444; cursor: not-allowed; }
        #ai-response { margin-top: 20px; padding: 15px; background: #222; border-radius: 8px; color: #00ff00; text-align: left; border-left: 4px solid #28a745; }
        .err { color: #ff4444; font-size: 0.8em; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>Assistant v5.0</h2>
    <button id="btn">🎙️ CLIQUEZ POUR PARLER</button>
    <p id="output" style="color:#777">Prêt.</p>
    <div id="ai-response">La réponse s'affichera ici.</div>
    <div id="debug" class="err"></div>
</div>

<script>
    // --- CONFIGURATION FINALE ---
    const API_KEY = "AIzaSyBVzeqmNIWmuOL4IP6nts-BcUQi2Ch7Awk";
    // gemini-pro est l'identifiant le plus compatible au monde
    const MODEL = "gemini-pro"; 

    const btn = document.getElementById('btn');
    const out = document.getElementById('output');
    const res = document.getElementById('ai-response');
    const debug = document.getElementById('debug');

    async function askGemini(text) {
        res.innerText = "Réflexion...";
        debug.style.display = "none";
        
        // URL v1beta avec models/gemini-pro
        const url = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${API_KEY}`;

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: "Réponse courte pour entretien : " + text }] }]
                })
            });

            const data = await response.json();

            if (response.ok && data.candidates) {
                const aiTxt = data.candidates[0].content.parts[0].text;
                res.innerText = aiTxt;
                // Voix
                const speech = new SpeechSynthesisUtterance(aiTxt);
                speech.lang = 'fr-FR';
                window.speechSynthesis.speak(speech);
            } else {
                throw new Error(data.error ? data.error.message : "Erreur de configuration");
            }
        } catch (e) {
            debug.innerText = "ERREUR : " + e.message;
            debug.style.display = "block";
            res.innerText = "L'IA n'a pas pu répondre.";
        } finally {
            btn.disabled = false;
            btn.innerText = "🎙️ CLIQUEZ POUR PARLER";
        }
    }

    btn.onclick = () => {
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!Speech) return alert("Chrome requis.");

        const rec = new Speech();
        rec.lang = 'fr-FR';
        
        rec.onstart = () => {
            btn.innerText = "ÉCOUTE...";
            btn.disabled = true;
        };

        rec.onresult = (e) => {
            const transcript = e.results[0][0].transcript;
            out.innerText = "Vu : " + transcript;
            askGemini(transcript);
        };

        rec.onerror = () => { btn.disabled = false; btn.innerText = "🎙️ ERREUR"; };
        rec.start();
    };
</script>

</body>
</html>
