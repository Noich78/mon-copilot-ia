<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Assistant Backup</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #121212; color: white; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 10px; border: 1px solid #333; }
        #start-btn { width: 100%; padding: 15px; background: #4bb543; border: none; color: white; cursor: pointer; border-radius: 5px; font-weight: bold; }
        #ai-response { margin-top: 20px; padding: 15px; background: #2d2d2d; border-radius: 5px; color: #00ff00; font-family: monospace; }
        .error-log { color: #ff4444; font-size: 0.8em; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h3>Copilot v3 (Stable)</h3>
    <button id="start-btn">Lancer le micro</button>
    <div id="output" style="margin-top:10px; color:#aaa;">J'écoute...</div>
    <div id="ai-response">En attente...</div>
    <div id="debug-log" class="error-log"></div>
</div>

<script>
    const startBtn = document.getElementById('start-btn');
    const output = document.getElementById('output');
    const aiResponse = document.getElementById('ai-response');
    const debugLog = document.getElementById('debug-log');

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    recognition.lang = 'fr-FR';
    recognition.continuous = true;

    recognition.onresult = (event) => {
        const transcript = event.results[event.results.length - 1][0].transcript;
        output.innerText = "Entendu : " + transcript;
        askGemini(transcript);
    };

    async function askGemini(text) {
    const API_KEY = "AIzaSyCWxtuSTP2zsRK7GfKUQesy8R3Z05KcqQY";
    
    // On repasse en v1beta pour le modèle flash qui est le plus compatible en gratuit
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

    try {
        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{ parts: [{ text: "Réponse courte : " + text }] }]
            })
        });

        const data = await response.json();

        if (response.ok) {
            // Ça va marcher ici !
            const answer = data.candidates[0].content.parts[0].text;
            aiResponse.innerText = answer;
            debugLog.innerText = ""; 
        } else {
            // Affichage de l'erreur précise si Google change encore d'avis
            debugLog.innerText = "ERREUR : " + (data.error ? data.error.message : "Inconnue");
        }
    } catch (e) {
        debugLog.innerText = "ERREUR RESEAU : " + e.message;
    }
}

    startBtn.onclick = () => {
        recognition.start();
        startBtn.innerText = "ÉCOUTE EN COURS...";
        startBtn.style.background = "#cc0000";
    };
</script>
</body>
</html>
