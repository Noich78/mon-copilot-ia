<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copilot Entretien v3.2</title>
    <style>
        :root { --primary: #4bb543; --error: #ff4444; --bg: #121212; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background: var(--bg); color: white; display: flex; justify-content: center; }
        .card { background: #1e1e1e; padding: 25px; border-radius: 12px; border: 1px solid #333; width: 100%; max-width: 550px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        #start-btn { width: 100%; padding: 15px; background: var(--primary); border: none; color: white; cursor: pointer; border-radius: 8px; font-weight: bold; font-size: 1.1em; transition: 0.3s; }
        #start-btn:disabled { background: #555; cursor: not-allowed; opacity: 0.6; }
        
        #output { margin-top: 20px; color: #aaa; font-style: italic; min-height: 24px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        
        #ai-response { margin-top: 20px; padding: 15px; background: #2d2d2d; border-radius: 8px; color: #00ff00; font-family: 'Consolas', monospace; line-height: 1.6; border-left: 4px solid var(--primary); min-height: 50px; }
        
        .error-log { color: var(--error); font-size: 0.85em; margin-top: 15px; padding: 10px; border: 1px dashed var(--error); display: none; background: rgba(255, 68, 68, 0.1); }
        
        .status-tag { font-size: 0.7em; text-transform: uppercase; letter-spacing: 1px; color: #777; margin-bottom: 5px; display: block; }
    </style>
</head>
<body>

<div class="card">
    <span class="status-tag">Mode Entretien Professionnel</span>
    <h2 style="margin: 0 0 20px 0;">Copilot AI v3.2</h2>
    
    <button id="start-btn">🎙️ COMMENCER À PARLER</button>
    
    <div id="output">En attente du micro...</div>
    
    <span class="status-tag" style="margin-top:20px;">Réponse de l'IA</span>
    <div id="ai-response">Prêt à vous aider pour votre entretien.</div>
    
    <div id="debug-log" class="error-log"></div>
</div>

<script>
    const startBtn = document.getElementById('start-btn');
    const output = document.getElementById('output');
    const aiResponse = document.getElementById('ai-response');
    const debugLog = document.getElementById('debug-log');

    // CONFIGURATION
    const API_KEY = "AIzaSyCGswZk1ZJZalmAGZVY3Sz9D0cIUPisObk"; // ⚠️ REMPLACE TA CLÉ ICI
    const MODEL_NAME = "gemini-1.5-flash-latest"; // Modèle le plus compatible
    const COOLDOWN_TIME = 15000; // 15 secondes d'attente entre requêtes pour le quota

    // RECONNAISSANCE VOCALE
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    recognition.lang = 'fr-FR';
    recognition.continuous = false; // Arrête après une phrase pour économiser le quota

    recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        output.innerText = "Vous avez dit : " + transcript;
        askGemini(transcript);
    };

    recognition.onstart = () => {
        startBtn.innerText = "ÉCOUTE EN COURS...";
        startBtn.style.background = "#cc0000";
    };

    recognition.onerror = () => {
        resetButton();
        debugLog.innerText = "Erreur micro : Assurez-vous d'avoir autorisé l'accès.";
        debugLog.style.display = "block";
    };

    async function askGemini(text) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${API_KEY}`;
        
        aiResponse.innerText = "Analyse de la question...";
        startBtn.disabled = true; // Bloque le bouton pendant le traitement

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ 
                        parts: [{ text: "Donne une réponse d'entretien d'embauche extrêmement concise (maximum 2 lignes) : " + text }] 
                    }]
                })
            });

            const data = await response.json();

            if (response.status === 429) {
                throw new Error("Quota dépassé (5 requêtes/min). Attendez un instant.");
            }

            if (response.ok && data.candidates) {
                const aiText = data.candidates[0].content.parts[0].text;
                aiResponse.innerText = aiText;
                debugLog.style.display = "none";
                
                // Synthèse vocale de la réponse
                speak(aiText);
            } else {
                throw new Error(data.error ? data.error.message : "Erreur inconnue");
            }
        } catch (e) {
            debugLog.innerText = "ERREUR : " + e.message;
            debugLog.style.display = "block";
            aiResponse.innerText = "Erreur de connexion.";
        } finally {
            startCooldown();
        }
    }

    // GESTION DU COOLDOWN (ANTI-QUOTA)
    function startCooldown() {
        let timeLeft = COOLDOWN_TIME / 1000;
        startBtn.disabled = true;
        
        const timer = setInterval(() => {
            startBtn.innerText = `PATIENTEZ (${timeLeft}s)`;
            timeLeft--;
            if (timeLeft < 0) {
                clearInterval(timer);
                resetButton();
            }
        }, 1000);
    }

    function resetButton() {
        startBtn.disabled = false;
        startBtn.innerText = "🎙️ COMMENCER À PARLER";
        startBtn.style.background = "#4bb543";
    }

    // SYNTHÈSE VOCALE
    function speak(text) {
        window.speechSynthesis.cancel(); // Stoppe une voix en cours
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'fr-FR';
        utterance.rate = 1.1; // Un peu plus rapide
        window.speechSynthesis.speak(utterance);
    }

    startBtn.onclick = () => {
        recognition.start();
    };
</script>

</body>
</html>
