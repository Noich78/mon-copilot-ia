<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Copilot Entretien Pro</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 20px; background: #f4f7f6; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        #start-btn { width: 100%; padding: 15px; border: none; border-radius: 10px; background: #007bff; color: white; font-weight: bold; cursor: pointer; }
        #output { margin-top: 15px; padding: 10px; background: #eee; border-radius: 5px; min-height: 50px; font-size: 0.9em; }
        #ai-response { margin-top: 15px; padding: 15px; background: #d4edda; border-left: 5px solid #28a745; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>Assistant Live</h2>
    <button id="start-btn">Activer le Micro</button>
    <div id="output">J'écoute...</div>
    <div id="ai-response">Les conseils de l'IA apparaîtront ici.</div>
</div>

<script>
    const startBtn = document.getElementById('start-btn');
    const output = document.getElementById('output');
    const aiResponse = document.getElementById('ai-response');

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    recognition.lang = 'fr-FR';
    recognition.continuous = true;
    recognition.interimResults = false;

    recognition.onresult = (event) => {
        const transcript = event.results[event.results.length - 1][0].transcript;
        output.innerText = transcript;
        askGemini(transcript);
    };

    async function askGemini(text) {
        // TA CLÉ API
        const API_KEY = "AIzaSyCWxtuSTP2zsRK7GfKUQesy8R3Z05KcqQY";
        
        // NOUVELLE URL STABLE
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: "Donne une réponse très courte à cette question d'entretien : " + text }] }]
                })
            });

            const data = await response.json();
            
            if (data.candidates && data.candidates[0].content) {
                aiResponse.innerText = data.candidates[0].content.parts[0].text;
            } else {
                console.error("Erreur API :", data);
                aiResponse.innerText = "L'IA n'a pas pu répondre.";
            }
        } catch (error) {
            console.error("Erreur Fetch :", error);
        }
    }

    startBtn.onclick = () => {
        recognition.start();
        startBtn.innerText = "🔴 Micro Actif";
        startBtn.style.background = "#dc3545";
    };
</script>
</body>
</html>
