<script>
    // REMPLACEZ UNIQUEMENT CETTE LIGNE AVEC LA CLÉ TOUTE NEUVE
    const API_KEY = "AIzaSyDIigeAGI3QGGBb6LrottjEbIwuVAaGwgY"; 
    const MODEL_ID = "gemini-1.5-flash"; 

    async function askGemini(text) {
        // Cette URL est la syntaxe exacte exigée par Google
        const url = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_ID}:generateContent?key=${API_KEY}`;
        
        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: "Réponds très brièvement : " + text }] }]
                })
            });

            const data = await response.json();
            if (response.ok) {
                const aiText = data.candidates[0].content.parts[0].text;
                document.getElementById('ai-response').innerText = aiText;
                window.speechSynthesis.speak(new SpeechSynthesisUtterance(aiText));
            } else {
                console.error("Erreur API:", data.error.message);
                document.getElementById('debug-log').innerText = data.error.message;
                document.getElementById('debug-log').style.display = "block";
            }
        } catch (e) {
            console.error("Erreur Réseau:", e);
        }
    }
</script>
