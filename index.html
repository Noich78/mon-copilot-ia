<script>
    const API_KEY = "AIzaSyBVzeqmNIWmuOL4IP6nts-BcUQi2Ch7Awk";
    
    const btn = document.getElementById('btn');
    const out = document.getElementById('output');
    const res = document.getElementById('res');

    const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
    const rec = new Speech ? new Speech() : null;

    if (rec) {
        rec.lang = 'fr-FR';
        rec.onresult = (e) => {
            const txt = e.results[0][0].transcript;
            out.innerText = "Entendu : " + txt;
            askGemini(txt);
        };
    }

    async function askGemini(prompt) {
        res.innerText = "Recherche du meilleur modèle...";
        btn.disabled = true;

        try {
            // ÉTAPE 1 : On demande la liste des modèles supportés par TA clé
            const listUrl = `https://generativelanguage.googleapis.com/v1beta/models?key=${API_KEY}`;
            const listResponse = await fetch(listUrl);
            const listData = await listResponse.json();
            
            // On cherche un modèle qui contient "flash" ou "pro" dans la liste
            const availableModel = listData.models.find(m => 
                m.supportedGenerationMethods.includes("generateContent")
            );

            if (!availableModel) throw new Error("Aucun modèle trouvé pour cette clé.");
            
            const modelName = availableModel.name; // C'est le nom exact (ex: models/gemini-1.5-flash-8b)
            res.innerText = "Modèle trouvé : " + modelName + ". Réflexion...";

            // ÉTAPE 2 : On fait la vraie requête avec le nom trouvé
            const url = `https://generativelanguage.googleapis.com/v1beta/${modelName}:generateContent?key=${API_KEY}`;
            
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: "Réponds brièvement en français : " + prompt }] }]
                })
            });

            const data = await response.json();
            if (response.ok) {
                const aiTxt = data.candidates[0].content.parts[0].text;
                res.innerText = aiTxt;
                window.speechSynthesis.speak(new SpeechSynthesisUtterance(aiTxt));
            } else {
                res.innerText = "Erreur : " + data.error.message;
            }
        } catch (err) {
            res.innerText = "ERREUR : " + err.message;
            console.error(err);
        } finally {
            btn.disabled = false;
            btn.innerText = "🎙️ CLIQUEZ POUR PARLER";
        }
    }

    btn.onclick = () => { rec.start(); btn.innerText = "ÉCOUTE..."; };
</script>
