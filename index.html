<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copilot Entretien v3.3</title>
    <style>
        :root { --primary: #4bb543; --error: #ff4444; --bg: #121212; }
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: var(--bg); color: white; display: flex; justify-content: center; }
        .card { background: #1e1e1e; padding: 25px; border-radius: 12px; border: 1px solid #333; width: 100%; max-width: 550px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        #start-btn { width: 100%; padding: 15px; background: var(--primary); border: none; color: white; cursor: pointer; border-radius: 8px; font-weight: bold; font-size: 1.1em; transition: 0.3s; }
        #start-btn:disabled { background: #444; cursor: not-allowed; opacity: 0.7; }
        
        #output { margin-top: 20px; color: #aaa; font-style: italic; min-height: 24px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        #ai-response { margin-top: 20px; padding: 15px; background: #2d2d2d; border-radius: 8px; color: #00ff00; font-family: monospace; line-height: 1.6; border-left: 4px solid var(--primary); }
        
        .error-log { color: var(--error); font-size: 0.85em; margin-top: 15px; padding: 10px; border: 1px dashed var(--error); display: none; background: rgba(255, 68, 68, 0.1); }
        .status-tag { font-size: 0.7em; text-transform: uppercase; letter-spacing: 1px; color: #777; margin-bottom: 5px; display: block; }
    </style>
</head>
<body>

<div class="card">
    <span class="status-tag">Assistant Entretien - Stable v1</span>
    <h2 style="margin: 0 0 20px 0;">Copilot AI v3.3</h2>
    
    <button id="start-btn">🎙️ COMMENCER À PARLER</button>
    
    <div id="output">En attente du micro...</div>
    
    <span class="status-tag" style="margin-top:20px;">Réponse de l'IA</span>
    <div id="ai-response">Prêt pour votre entretien.</div>
    
    <div id="debug-log" class="error-log"></div>
</div>

<script>
    const startBtn = document.getElementById('start-btn');
    const output = document.getElementById('output');
    const aiResponse = document.getElementById('ai-response');
    const debugLog = document.getElementById('debug-log');

    // --- CONFIGURATION ---
    // Utilisation de la version STABLE v1 pour éviter les erreurs 404
    const API_KEY = "AIzaSyCGswZk1ZJZalmAGZVY3Sz9D0cIUPisObk"; 
    const MODEL_ID = "gemini-1.5-flash"; // Nom de modèle standard
    const COOLDOWN_TIME = 15000; // 15 secondes (Limite Free Tier)

    // --- RECONNAISSANCE VOCALE ---
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    recognition.lang = 'fr-FR';
    recognition.continuous = false; // Plus stable pour éviter d'envoyer 5 requêtes par seconde

    recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        output.innerText = "Entendu : " + transcript;
        askGemini(transcript);
    };

    recognition.onstart = () => {
        startBtn.innerText = "ÉCOUTE EN COURS...";
        startBtn.style.background = "#cc0000";
        debugLog.style.display = "none";
    };

    recognition.onerror = () => {
        resetButton();
        debugLog.innerText = "Erreur micro. Vérifiez les autorisations.";
        debugLog.style.display = "block";
    };

    // --- APPEL API GEMINI ---
    async function askGemini(text) {
        // Changement vers l'endpoint v1 STABLE
        const url = `https://generativelanguage.googleapis.com/v1/models/${MODEL_ID}:generateContent?key=${API_KEY}`;
        
        aiResponse.innerText = "Réflexion...";
        startBtn.disabled = true;

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ 
                        parts: [{ text: "Réponds en une seule phrase courte et percutante pour un entretien : " + text }] 
                    }]
                })
            });

            const data = await response.json();

            if (response.status === 404) {
                throw new Error("Modèle introuvable. Vérifiez MODEL_ID.");
            } else if (response.status === 429) {
                throw new Error("Quota dépassé. Attendez 30 secondes.");
            }

            if (response.ok && data.candidates) {
                const aiText = data.candidates[0].content.parts[0].text;
                aiResponse.innerText = aiText;
                speak(aiText); // Synthèse vocale
            } else {
                throw new Error(data.error ? data.error.message : "Erreur API");
            }
        } catch (e) {
            debugLog.innerText = "ERREUR : " + e.message;
            debugLog.style.display = "block";
            aiResponse.innerText = "Erreur de réponse.";
        } finally {
            startCooldown();
        }
    }

    // --- ANTI-QUOTA & UI ---
    function startCooldown() {
        let timeLeft = Math.floor(COOLDOWN_TIME / 1000);
        startBtn.disabled = true;
        
        const timer = setInterval(() => {
            startBtn.innerText = `PATIENTEZ (${timeLeft}s)`;
            timeLeft--;
            if (timeLeft < 0) {
                clearInterval(timer);
                resetButton();
            }
        }, 1000);
    }

    function resetButton() {
        startBtn.disabled = false;
        startBtn.innerText = "🎙️ COMMENCER À PARLER";
        startBtn.style.background = "#4bb543";
    }

    // --- SYNTHÈSE VOCALE ---
    function speak(text) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'fr-FR';
        msg.rate = 1.0;
        window.speechSynthesis.speak(msg);
    }

    startBtn.onclick = () => {
        if (!startBtn.disabled) recognition.start();
    };
</script>

</body>
</html>
