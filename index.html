<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copilot Entretien v4.0</title>
    <style>
        body { background: #121212; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 40px 20px; }
        .card { background: #1e1e1e; padding: 30px; border-radius: 15px; border: 1px solid #333; max-width: 450px; margin: 0 auto; }
        button { width: 100%; padding: 15px; background: #4bb543; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:disabled { background: #333; cursor: not-allowed; }
        #output { color: #888; font-style: italic; margin: 20px 0; min-height: 1.2em; }
        #ai-response { background: #2d2d2d; padding: 20px; border-radius: 10px; color: #00ff00; text-align: left; border-left: 4px solid #4bb543; font-family: monospace; }
        .error { color: #ff4444; margin-top: 15px; font-size: 0.8em; display: none; background: rgba(255,0,0,0.1); padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin-top:0;">Copilot AI v4.0</h2>
    <button id="btn">🎙️ CLIQUEZ ET PARLEZ</button>
    <div id="output">Prêt...</div>
    <div id="ai-response">La réponse s'affichera ici.</div>
    <div id="debug" class="error"></div>
</div>

<script>
    // --- CONFIGURATION ---
    const API_KEY = "AIzaSyBVzeqmNIWmuOL4IP6nts-BcUQi2Ch7Awk";
    // CHANGEMENT : On utilise l'alias 'latest' ou 'gemini-1.5-flash' sur l'endpoint V1
    const MODEL = "gemini-1.5-flash-latest"; 

    const btn = document.getElementById('btn');
    const output = document.getElementById('output');
    const aiResponse = document.getElementById('ai-response');
    const debug = document.getElementById('debug');

    async function askGemini(text) {
        aiResponse.innerText = "Réflexion...";
        debug.style.display = "none";
        
        // URL V1 STABLE (Au lieu de v1beta)
        const url = `https://generativelanguage.googleapis.com/v1/models/${MODEL}:generateContent?key=${API_KEY}`;

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: "Réponse courte pour un entretien : " + text }] }]
                })
            });

            const data = await response.json();

            if (response.ok && data.candidates) {
                const result = data.candidates[0].content.parts[0].text;
                aiResponse.innerText = result;
                
                // Synthèse Vocale
                window.speechSynthesis.cancel();
                const speech = new SpeechSynthesisUtterance(result);
                speech.lang = 'fr-FR';
                window.speechSynthesis.speak(speech);
            } else {
                throw new Error(data.error ? data.error.message : "Erreur de réponse");
            }
        } catch (e) {
            debug.innerText = "ERREUR : " + e.message;
            debug.style.display = "block";
            aiResponse.innerText = "L'IA n'a pas pu répondre.";
        } finally {
            btn.disabled = false;
            btn.innerText = "🎙️ CLIQUEZ ET PARLEZ";
            btn.style.background = "#4bb543";
        }
    }

    btn.onclick = () => {
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!Speech) return alert("Navigateur non compatible.");

        const recognition = new Speech();
        recognition.lang = 'fr-FR';
        
        recognition.onstart = () => {
            btn.innerText = "ÉCOUTE...";
            btn.style.background = "#cc0000";
            btn.disabled = true;
        };

        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            output.innerText = "Vous : " + transcript;
            askGemini(transcript);
        };

        recognition.onerror = () => {
            btn.disabled = false;
            btn.innerText = "🎙️ ERREUR (Réessayer)";
            btn.style.background = "#4bb543";
        };

        recognition.start();
    };
</script>

</body>
</html>
