<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Copilot Final Fix v6.1</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { border: 1px solid #333; padding: 20px; border-radius: 10px; background: #111; max-width: 450px; margin: auto; }
        button { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #res { margin-top: 20px; color: #0f0; min-height: 40px; text-align: left; }
        .debug-panel { margin-top: 20px; font-size: 10px; color: #666; text-align: left; background: #050505; padding: 10px; border: 1px dashed #222; }
    </style>
</head>
<body>

<div class="box">
    <h3>Copilot v6.1</h3>
    <button id="btn">🎙️ CLIQUEZ ET PARLEZ</button>
    <div id="res">En attente de votre question...</div>
    <div id="debug" class="debug-panel">Logs : Prêt.</div>
</div>

<script>
    const API_KEY = "AIzaSyBVzeqmNIWmuOL4IP6nts-BcUQi2Ch7Awk";
    const btn = document.getElementById('btn');
    const res = document.getElementById('res');
    const debug = document.getElementById('debug');

    async function askGemini(text) {
        btn.disabled = true;
        res.innerText = "Analyse en cours...";
        
        try {
            // Utilisation directe du modèle pour économiser une requête de diagnostic
            const activeModel = "gemini-1.5-flash"; 
            const genUrl = `https://generativelanguage.googleapis.com/v1beta/models/${activeModel}:generateContent?key=${API_KEY}`;
            
            const response = await fetch(genUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: "Réponse courte : " + text }] }] })
            });

            const data = await response.json();

            if (response.status === 429) {
                throw new Error("QUOTA DÉPASSÉ : Attendez 1 minute avant de reparler.");
            }

            if (response.ok) {
                const aiTxt = data.candidates[0].content.parts[0].text;
                res.innerText = aiTxt;
                window.speechSynthesis.speak(new SpeechSynthesisUtterance(aiTxt));
            } else {
                throw new Error(data.error.message);
            }
        } catch (e) {
            res.innerText = "Pause nécessaire...";
            debug.innerText = "LOG : " + e.message;
            debug.style.display = "block";
        } finally {
            // ON FORCE UNE PAUSE DE 15 SECONDES SUR LE BOUTON
            let timeLeft = 15;
            const timer = setInterval(() => {
                btn.innerText = `PATIENTEZ (${timeLeft}s)`;
                timeLeft--;
                if (timeLeft < 0) {
                    clearInterval(timer);
                    btn.disabled = false;
                    btn.innerText = "🎙️ CLIQUEZ ET PARLEZ";
                }
            }, 1000);
        }
    }

    btn.onclick = () => {
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!Speech) return alert("Chrome requis.");
        const rec = new Speech();
        rec.lang = 'fr-FR';
        rec.onresult = (e) => askGemini(e.results[0][0].transcript);
        rec.start();
        btn.innerText = "ÉCOUTE EN COURS...";
    };
</script>

</body>
</html>
