<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Copilot Entretien v7.0</title>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #161616; padding: 30px; border-radius: 20px; border: 1px solid #333; width: 400px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        button { width: 100%; padding: 18px; background: #00c851; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.2s; }
        button:disabled { background: #333; cursor: not-allowed; color: #777; }
        #res { margin-top: 25px; padding: 15px; background: #222; border-radius: 10px; color: #00ff00; text-align: left; border-left: 5px solid #00c851; min-height: 50px; font-family: monospace; }
        .status { font-size: 0.8em; color: #666; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin-bottom: 5px;">Copilot v7.0</h2>
    <div id="status" class="status">Prêt pour l'entretien</div>
    <div id="output" style="margin: 20px 0; color: #aaa; font-style: italic;">Cliquez pour parler...</div>
    <button id="btn">🎙️ COMMENCER À PARLER</button>
    <div id="res">La réponse s'affichera ici.</div>
</div>

<script>
    const API_KEY = "AIzaSyBVzeqmNIWmuOL4IP6nts-BcUQi2Ch7Awk";
    // On utilise 1.5-flash-8b sur l'endpoint v1 (plus robuste aux erreurs 404)
    const MODEL = "gemini-1.5-flash-8b"; 

    const btn = document.getElementById('btn');
    const status = document.getElementById('status');
    const output = document.getElementById('output');
    const res = document.getElementById('res');

    async function askGemini(text) {
        btn.disabled = true;
        res.innerText = "Réflexion...";
        
        // Utilisation de l'endpoint v1 stable
        const url = `https://generativelanguage.googleapis.com/v1/models/${MODEL}:generateContent?key=${API_KEY}`;

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: "Réponds très brièvement : " + text }] }]
                })
            });

            const data = await response.json();

            if (response.status === 404) throw new Error("Modèle non reconnu sur cet endpoint.");
            if (response.status === 429) throw new Error("Quota atteint. Patientez 60s.");

            if (response.ok && data.candidates) {
                const aiTxt = data.candidates[0].content.parts[0].text;
                res.innerText = aiTxt;
                
                // Audio
                window.speechSynthesis.cancel();
                const speech = new SpeechSynthesisUtterance(aiTxt);
                speech.lang = 'fr-FR';
                window.speechSynthesis.speak(speech);
            } else {
                throw new Error(data.error ? data.error.message : "Erreur API");
            }
        } catch (e) {
            res.innerText = "ERREUR : " + e.message;
            console.error(e);
        } finally {
            // Pause de sécurité pour le quota
            let countdown = 10;
            const timer = setInterval(() => {
                btn.innerText = `ATTENTE (${countdown}s)`;
                countdown--;
                if (countdown < 0) {
                    clearInterval(timer);
                    btn.disabled = false;
                    btn.innerText = "🎙️ COMMENCER À PARLER";
                }
            }, 1000);
        }
    }

    btn.onclick = () => {
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!Speech) return alert("Chrome requis");

        const rec = new Speech();
        rec.lang = 'fr-FR';
        rec.onstart = () => { btn.innerText = "ÉCOUTE..."; btn.disabled = true; };
        rec.onresult = (e) => {
            const txt = e.results[0][0].transcript;
            output.innerText = "Vous : " + txt;
            askGemini(txt);
        };
        rec.onerror = () => { btn.disabled = false; btn.innerText = "RÉESSAYER"; };
        rec.start();
    };
</script>

</body>
</html>
